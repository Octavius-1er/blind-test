<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blind Test — Élève</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0e0e14;
    --surface: #17171f;
    --surface2: #1f1f2e;
    --border: #2a2a3d;
    --accent: #7c6af7;
    --accent2: #f7c06a;
    --green: #4ade80;
    --red: #f87171;
    --text: #e8e8f0;
    --muted: #6b6b88;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 1.1rem;
    color: var(--accent);
    margin-bottom: 8px;
    letter-spacing: -0.02em;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px 24px;
    width: 100%;
    max-width: 380px;
  }

  h2 {
    font-family: 'Space Mono', monospace;
    font-size: 1rem;
    margin-bottom: 20px;
    color: var(--text);
  }

  label { font-size: 0.85rem; color: var(--muted); display: block; margin-bottom: 6px; }

  input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1rem;
    padding: 11px 14px;
    outline: none;
    transition: border-color 0.15s;
    margin-bottom: 14px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  input:focus { border-color: var(--accent); }
  input#pseudo { text-transform: none; letter-spacing: 0; }

  .btn {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-primary { background: var(--accent); color: #fff; }

  .hidden { display: none !important; }

  /* BUZZER */
  #buzzer-screen {
    width: 100%;
    max-width: 380px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .pseudo-display {
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    color: var(--muted);
    text-align: center;
  }
  .pseudo-display strong { color: var(--accent2); }

  .score-display {
    text-align: center;
  }
  .score-number {
    font-family: 'Space Mono', monospace;
    font-size: 3.5rem;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }
  .score-label {
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* Le gros bouton buzzer */
  #buzz-btn {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 1.4rem;
    color: #fff;
    background: radial-gradient(circle at 35% 35%, #9f8fff, var(--accent) 70%);
    box-shadow: 0 0 0 0 rgba(124,106,247,0.5), 0 8px 40px rgba(124,106,247,0.4);
    transition: box-shadow 0.15s, transform 0.1s, background 0.2s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  #buzz-btn:active:not(:disabled) {
    transform: scale(0.93);
    box-shadow: 0 0 0 0 rgba(124,106,247,0.2), 0 4px 20px rgba(124,106,247,0.3);
  }
  #buzz-btn.buzzed {
    background: radial-gradient(circle at 35% 35%, #6bef9f, #2a9d5c 70%);
    box-shadow: 0 0 0 20px rgba(74,222,128,0.1), 0 8px 40px rgba(74,222,128,0.4);
    animation: buzzPulse 1s ease-out;
  }
  #buzz-btn.disabled-btn {
    background: radial-gradient(circle at 35% 35%, #3a3a4a, #2a2a3d 70%);
    box-shadow: none;
    cursor: not-allowed;
  }
  @keyframes buzzPulse {
    0% { box-shadow: 0 0 0 0 rgba(74,222,128,0.6), 0 8px 40px rgba(74,222,128,0.4); }
    100% { box-shadow: 0 0 0 30px rgba(74,222,128,0), 0 8px 40px rgba(74,222,128,0.2); }
  }

  .buzz-status {
    font-size: 0.9rem;
    color: var(--muted);
    text-align: center;
    min-height: 22px;
  }
  .buzz-status.active { color: var(--accent2); font-weight: 600; }
  .buzz-status.ok { color: var(--green); }

  .queue-pos {
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    color: var(--muted);
    text-align: center;
  }

  .game-status {
    text-align: center;
    padding: 14px 20px;
    border-radius: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    font-size: 0.88rem;
    color: var(--muted);
    width: 100%;
  }
  .game-status.ended {
    color: var(--accent2);
    border-color: var(--accent2);
  }
</style>
</head>
<body>

<div class="logo">🎵 Blind Test</div>

<!-- JOIN SCREEN -->
<div class="card" id="join-screen">
  <h2>Rejoindre la session</h2>
  <label>Code de la session</label>
  <input type="text" id="code-input" maxlength="4" placeholder="XXXX" oninput="this.value=this.value.toUpperCase()" />
  <label>Ton prénom</label>
  <input type="text" id="pseudo" maxlength="20" placeholder="Ex: Lucas" />
  <button class="btn btn-primary" onclick="joinSession()">Rejoindre !</button>
  <p id="join-error" style="color:var(--red);font-size:0.85rem;margin-top:10px;display:none"></p>
</div>

<!-- LOBBY -->
<div id="lobby-screen" class="hidden" style="text-align:center;max-width:380px;width:100%">
  <div class="card">
    <div style="font-size:2rem;margin-bottom:12px">⏳</div>
    <h2>En attente du professeur…</h2>
    <p style="color:var(--muted);font-size:0.88rem;margin-top:8px">La partie va bientôt commencer !</p>
    <p style="margin-top:16px;font-size:0.85rem">Tu joues en tant que <strong id="lobby-pseudo" style="color:var(--accent2)"></strong></p>
  </div>
</div>

<!-- GAME / BUZZER SCREEN -->
<div id="buzzer-screen" class="hidden">
  <div class="pseudo-display">Tu joues en tant que <strong id="game-pseudo"></strong></div>

  <div class="score-display">
    <div class="score-number" id="my-score">0</div>
    <div class="score-label">point(s)</div>
  </div>

  <div class="game-status" id="round-status">Round en cours…</div>

  <button id="buzz-btn" onclick="buzz()">BUZZ !</button>

  <div class="buzz-status" id="buzz-status">Appuie dès que tu reconnais la musique</div>
  <div class="queue-pos" id="queue-pos"></div>
</div>

<!-- ENDED -->
<div id="ended-screen" class="hidden" style="text-align:center;max-width:380px;width:100%">
  <div class="card">
    <div style="font-size:2.5rem;margin-bottom:12px">🏆</div>
    <h2>Blind test terminé !</h2>
    <p style="color:var(--muted);font-size:0.88rem;margin-top:8px">Merci d'avoir joué</p>
    <p style="margin-top:16px;font-size:1.1rem">Ton score : <strong id="final-score" style="color:var(--accent);font-family:Space Mono,monospace">0</strong> pt(s)</p>
  </div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue, update, get, push, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ─── CONFIGURE FIREBASE ICI ───────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyBjUlZ9r5v2rIqi4bkqXcBnnenoQSnatCg",
  authDomain: "blind-test-2d3d6.firebaseapp.com",
  databaseURL: "https://blind-test-2d3d6-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "blind-test-2d3d6",
  storageBucket: "blind-test-2d3d6.firebasestorage.app",
  messagingSenderId: "1031371886486",
  appId: "1:1031371886486:web:f4b0d1caba5e14a731d7b7"
};
// ──────────────────────────────────────────────────────────────────────────

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let sessionCode = null;
let pseudo = null;
let hasBuzzed = false;
let currentRound = -1;
let myBuzzKey = null;

function show(id) {
  ['join-screen','lobby-screen','buzzer-screen','ended-screen'].forEach(s => {
    document.getElementById(s).classList.toggle('hidden', s !== id);
  });
}

window.joinSession = async function() {
  const code = document.getElementById('code-input').value.trim().toUpperCase();
  const name = document.getElementById('pseudo').value.trim();
  const err = document.getElementById('join-error');

  if (!code || code.length !== 4) { err.style.display='block'; err.textContent='Code à 4 lettres requis'; return; }
  if (!name) { err.style.display='block'; err.textContent='Entre ton prénom'; return; }

  // Vérifier session
  const sessRef = ref(db, `sessions/${code}`);
  const snap = await get(sessRef);
  if (!snap.exists()) { err.style.display='block'; err.textContent='Session introuvable. Vérifie le code.'; return; }
  if (snap.val().status === 'ended') { err.style.display='block'; err.textContent='Cette session est terminée.'; return; }

  // Vérifier pseudo non pris
  const playerSnap = await get(ref(db, `sessions/${code}/players/${name}`));
  if (playerSnap.exists()) { err.style.display='block'; err.textContent='Ce prénom est déjà pris !'; return; }

  err.style.display='none';
  sessionCode = code;
  pseudo = name;

  // S'enregistrer
  await set(ref(db, `sessions/${code}/players/${name}`), { score: 0, joinedAt: Date.now() });

  document.getElementById('lobby-pseudo').textContent = name;
  document.getElementById('game-pseudo').textContent = name;

  show('lobby-screen');

  // Écouter l'état de la session
  onValue(ref(db, `sessions/${code}`), snap => {
    const s = snap.val();
    if (!s) return;

    if (s.status === 'ended') {
      const score = s.players?.[pseudo]?.score || 0;
      document.getElementById('final-score').textContent = score;
      show('ended-screen');
      return;
    }

    if (s.status === 'playing') {
      show('buzzer-screen');

      // Nouveau round → réinitialiser
      if (s.currentRound !== currentRound) {
        currentRound = s.currentRound;
        hasBuzzed = false;
        myBuzzKey = null;
        resetBuzzBtn();
        document.getElementById('round-status').textContent = `Round ${currentRound+1}`;
        document.getElementById('queue-pos').textContent = '';
        document.getElementById('buzz-status').textContent = 'Appuie dès que tu reconnais la musique';
      }

      // Mon score
      const myScore = s.players?.[pseudo]?.score || 0;
      document.getElementById('my-score').textContent = myScore;

      // Affichage de la réponse si le prof l'a révélée
      const roundStatus = document.getElementById('round-status');
      if (s.revealAnswer && s.rounds?.[currentRound]) {
        roundStatus.textContent = `🎉 ${s.rounds[currentRound].answer}`;
        roundStatus.className = 'game-status ended';
      } else if (!s.revealAnswer && roundStatus.classList.contains('ended')) {
        roundStatus.textContent = `Round ${currentRound + 1}`;
        roundStatus.className = 'game-status';
      }
    }
  });

  // Écouter les buzzers pour afficher ma position
  onValue(ref(db, `sessions/${code}/buzzers`), snap => {
    const data = snap.val() || {};
    const sorted = Object.entries(data).sort((a,b) => a[1].time - b[1].time);
    const myIdx = sorted.findIndex(([k,v]) => v.pseudo === pseudo);

    if (myIdx === -1) {
      document.getElementById('queue-pos').textContent = '';
      if (!hasBuzzed) {
        // File vidée par le prof → reset
        hasBuzzed = false;
        myBuzzKey = null;
        resetBuzzBtn();
      }
      return;
    }

    if (myIdx === 0) {
      document.getElementById('buzz-status').textContent = "C'est à toi de répondre !";
      document.getElementById('buzz-status').className = 'buzz-status active';
      document.getElementById('queue-pos').textContent = '';
      setBuzzState('active');
    } else {
      document.getElementById('buzz-status').textContent = `Tu es en file…`;
      document.getElementById('buzz-status').className = 'buzz-status';
      document.getElementById('queue-pos').textContent = `Position ${myIdx+1}`;
      setBuzzState('buzzed');
    }
  });
};

window.buzz = async function() {
  if (hasBuzzed) return;
  hasBuzzed = true;
  setBuzzState('buzzed');
  document.getElementById('buzz-status').textContent = 'Buzzer envoyé !';
  document.getElementById('buzz-status').className = 'buzz-status ok';

  // Envoyer avec timestamp serveur-like (Date.now() côté client, très suffisant)
  const buzzRef = ref(db, `sessions/${sessionCode}/buzzers`);
  const newRef = push(buzzRef);
  myBuzzKey = newRef.key;
  await set(newRef, { pseudo, time: Date.now() });
};

function setBuzzState(state) {
  const btn = document.getElementById('buzz-btn');
  btn.className = '';
  if (state === 'buzzed') btn.classList.add('buzzed');
  if (state === 'disabled') btn.classList.add('disabled-btn');
  if (state === 'active') { btn.className = ''; btn.style.animation=''; }
}

function resetBuzzBtn() {
  const btn = document.getElementById('buzz-btn');
  btn.className = '';
  btn.removeAttribute('disabled');
  document.getElementById('buzz-status').textContent = 'Appuie dès que tu reconnais la musique';
  document.getElementById('buzz-status').className = 'buzz-status';
}
</script>

</body>
</html>
