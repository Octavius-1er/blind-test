<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blind Test — Tableau de classe</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;900&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0a0a10;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #252535;
    --accent: #7c6af7;
    --accent2: #f7c06a;
    --green: #4ade80;
    --red: #f87171;
    --text: #e8e8f0;
    --muted: #5a5a75;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    overflow: hidden;
  }

  /* JOIN VIEW */
  #join-view {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 20px;
  }

  .join-title {
    font-family: 'Space Mono', monospace;
    font-size: 1.5rem;
    color: var(--accent);
    letter-spacing: -0.02em;
  }

  .join-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 32px 28px;
    width: 360px;
  }

  label { font-size: 0.85rem; color: var(--muted); display: block; margin-bottom: 6px; }

  input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 1.4rem;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.15s;
    margin-bottom: 16px;
    text-align: center;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  input:focus { border-color: var(--accent); }

  .btn-join {
    width: 100%;
    padding: 13px;
    border-radius: 8px;
    border: none;
    background: var(--accent);
    color: #fff;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn-join:hover { opacity: 0.88; }

  /* DISPLAY VIEW */
  #display-view {
    display: none;
    height: 100vh;
    display: none;
    grid-template-columns: 1fr 340px;
    grid-template-rows: 70px 1fr;
    gap: 0;
  }
  #display-view.active {
    display: grid;
  }

  /* Header */
  .header {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 28px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .header-logo {
    font-family: 'Space Mono', monospace;
    font-size: 1rem;
    color: var(--accent);
    font-weight: 700;
  }

  .header-session {
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    color: var(--muted);
  }
  .header-code {
    font-family: 'Space Mono', monospace;
    font-size: 1rem;
    color: var(--accent2);
    font-weight: 700;
    letter-spacing: 0.15em;
    margin-left: auto;
    padding: 4px 12px;
    background: var(--surface2);
    border-radius: 6px;
    border: 1px solid var(--border);
  }

  .live-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    animation: livePulse 1.5s infinite;
  }
  @keyframes livePulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* Buzzer zone (centre) */
  .buzzer-zone {
    padding: 28px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    overflow-y: auto;
  }

  .zone-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 4px;
  }

  /* Buzzer cards */
  .buzzer-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    animation: popIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
    transition: opacity 0.2s;
  }
  @keyframes popIn {
    from { opacity:0; transform:scale(0.85) translateY(8px); }
    to   { opacity:1; transform:scale(1) translateY(0); }
  }

  .buzzer-card.first {
    background: #1c1850;
    border-color: var(--accent);
    border-width: 2px;
    box-shadow: 0 0 30px rgba(124,106,247,0.2);
  }

  .buzzer-pos {
    font-family: 'Space Mono', monospace;
    font-size: 2rem;
    font-weight: 700;
    color: var(--muted);
    min-width: 40px;
  }
  .buzzer-card.first .buzzer-pos { color: var(--accent2); font-size: 2.4rem; }

  .buzzer-name {
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--text);
    flex: 1;
  }
  .buzzer-card.first .buzzer-name { font-size: 2rem; color: #fff; }

  .buzzer-tag {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    padding: 4px 10px;
    border-radius: 20px;
    background: var(--accent);
    color: #fff;
  }

  /* Empty state */
  .empty-buzz {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 1rem;
  }
  .empty-buzz div { font-size: 3rem; margin-bottom: 12px; }

  /* Scores (droite) */
  .scores-zone {
    background: var(--surface);
    border-left: 1px solid var(--border);
    padding: 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  .score-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 10px;
    border-radius: 8px;
    transition: background 0.2s;
  }
  .score-row:hover { background: var(--surface2); }

  .score-rank {
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    color: var(--muted);
    min-width: 24px;
  }
  .score-rank.gold { color: var(--accent2); font-size: 1rem; }

  .score-name {
    flex: 1;
    font-size: 1rem;
    font-weight: 500;
  }

  .score-pts {
    font-family: 'Space Mono', monospace;
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--accent);
  }

  /* Round counter */
  .round-badge {
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    color: var(--muted);
    padding: 3px 10px;
    background: var(--surface2);
    border-radius: 20px;
    border: 1px solid var(--border);
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- JOIN -->
<div id="join-view">
  <div class="join-title">🎵 Blind Test — Tableau de classe</div>
  <div class="join-card">
    <label>Code de la session</label>
    <input type="text" id="code-input" maxlength="4" placeholder="XXXX" oninput="this.value=this.value.toUpperCase()" />
    <button class="btn-join" onclick="connect()">Afficher le tableau</button>
    <p id="err" style="color:#f87171;font-size:0.85rem;margin-top:10px;display:none"></p>
  </div>
</div>

<!-- DISPLAY -->
<div id="display-view">
  <header class="header">
    <div class="live-dot"></div>
    <span class="header-logo">🎵 Blind Test</span>
    <span class="header-session" id="session-name-display"></span>
    <span class="round-badge" id="round-badge">Round —</span>
    <span class="header-code" id="header-code"></span>
  </header>

  <div class="buzzer-zone">
    <div class="zone-label">Buzzers</div>
    <div id="buzzer-list"></div>
  </div>

  <div class="scores-zone">
    <div class="zone-label" style="margin-bottom:12px">Scores</div>
    <div id="score-list"></div>
  </div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, get }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ─── CONFIGURE FIREBASE ICI ───────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "VOTRE_API_KEY",
  authDomain: "VOTRE_PROJECT.firebaseapp.com",
  databaseURL: "https://VOTRE_PROJECT-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "VOTRE_PROJECT",
  storageBucket: "VOTRE_PROJECT.appspot.com",
  messagingSenderId: "VOTRE_SENDER_ID",
  appId: "VOTRE_APP_ID"
};
// ──────────────────────────────────────────────────────────────────────────

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.connect = async function() {
  const code = document.getElementById('code-input').value.trim().toUpperCase();
  const err = document.getElementById('err');

  if (code.length !== 4) { err.style.display='block'; err.textContent='Code à 4 lettres'; return; }

  const snap = await get(ref(db, `sessions/${code}`));
  if (!snap.exists()) { err.style.display='block'; err.textContent='Session introuvable'; return; }

  err.style.display = 'none';
  document.getElementById('join-view').style.display = 'none';
  document.getElementById('display-view').classList.add('active');
  document.getElementById('header-code').textContent = code;

  // Session info
  onValue(ref(db, `sessions/${code}`), snap => {
    const s = snap.val();
    if (!s) return;
    document.getElementById('session-name-display').textContent = s.name || '';
    if (s.rounds && s.currentRound !== undefined) {
      document.getElementById('round-badge').textContent =
        `Round ${s.currentRound+1} / ${Object.keys(s.rounds).length}`;
    }

    // Scores
    const players = s.players || {};
    const sorted = Object.entries(players).sort((a,b) => (b[1].score||0) - (a[1].score||0));
    document.getElementById('score-list').innerHTML = sorted.length === 0
      ? '<p style="color:var(--muted);font-size:0.85rem">En attente des élèves…</p>'
      : sorted.map(([name,p],i) => `
          <div class="score-row">
            <span class="score-rank ${i===0?'gold':''}">${i===0?'🥇':i+1}</span>
            <span class="score-name">${name}</span>
            <span class="score-pts">${p.score||0}</span>
          </div>
        `).join('');
  });

  // Buzzers
  onValue(ref(db, `sessions/${code}/buzzers`), snap => {
    const data = snap.val() || {};
    const sorted = Object.entries(data).sort((a,b) => a[1].time - b[1].time);
    const el = document.getElementById('buzzer-list');

    if (sorted.length === 0) {
      el.innerHTML = `
        <div class="empty-buzz">
          <div>🎧</div>
          Écoutez…
        </div>`;
      return;
    }

    el.innerHTML = sorted.map(([k,v],i) => `
      <div class="buzzer-card ${i===0?'first':''}">
        <div class="buzzer-pos">${i===0?'⭐':i+1}</div>
        <div class="buzzer-name">${v.pseudo}</div>
        ${i===0?'<span class="buzzer-tag">À la parole</span>':''}
      </div>
    `).join('');
  });
};
</script>

</body>
</html>
